<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Бычатник{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg bg-dark navbar-dark mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" href="{% url 'bulls:dashboard' %}">Бычатник</a>
        <div class="navbar-nav">
            <a class="nav-link" href="{% url 'bulls:dashboard' %}">Главная</a>
            <a class="nav-link" href="{% url 'bulls:bull_list' %}">Быки</a>
            <a class="nav-link" href="{% url 'bulls:excel_import' %}">Импорт Excel</a>
            <a class="nav-link" href="{% url 'bulls:bulk_transfer' %}">Массовый перевод</a>
            <a class="nav-link" href="{% url 'bulls:reports' %}">Отчеты</a>
            <a class="nav-link" href="/admin/">Админка</a>
        </div>
    </div>
</nav>

<main class="container pb-5">
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags|default:'info' }}">{{ message }}</div>
        {% endfor %}
    {% endif %}
    {% block content %}{% endblock %}
</main>
</body>
</html>
